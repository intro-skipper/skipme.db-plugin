name: "Release Plugin"

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark upload as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plugin
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from build.yaml
        shell: bash
        run: |
          VERSION=$(grep '^version:' build.yaml | grep -oP '[\d.]+')
          echo "CURRENT_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_ENV

      - name: Increment patch version
        if: ${{ inputs.prerelease != true }}
        shell: bash
        run: |
          IFS='.' read -ra VER <<< "${{ env.CURRENT_VERSION }}"
          NEW_PATCH=$((${VER[2]} + 1))
          NEW_VERSION="${VER[0]}.${VER[1]}.$NEW_PATCH.0"
          echo "RELEASE_TAG=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore SkipMe.Db.Plugin.sln

      - name: Build
        run: dotnet build SkipMe.Db.Plugin.sln --configuration Release --no-restore

      - name: Package release artifact
        run: zip -j "SkipMe.db-plugin-v${{ env.RELEASE_TAG }}.zip" SkipMe.Db.Plugin/bin/Release/net9.0/SkipMe.Db.Plugin.dll

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PRERELEASE="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE="true"
          fi

          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi

          if gh release view "v${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            gh release upload v"${{ env.RELEASE_TAG }}" "SkipMe.db-plugin-v${{ env.RELEASE_TAG }}.zip" --clobber
          else
            gh release create "v${{ env.RELEASE_TAG }}" "SkipMe.db-plugin-v${{ env.RELEASE_TAG }}.zip" --title "v${{ env.RELEASE_TAG }}" --generate-notes --target "${{ github.event.repository.default_branch }}" ${PRERELEASE_FLAG}
          fi

      - name: Commit updated build.yaml
        if: ${{ inputs.prerelease != true }}
        shell: bash
        run: |
          sed -i "s/version: \"${{ env.CURRENT_VERSION }}\"/version: \"${{ env.RELEASE_TAG }}\"/" build.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.yaml
          git commit -m "Increment patch version to ${{ env.RELEASE_TAG }}"
          git push
